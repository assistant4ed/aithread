name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  ACR_NAME: threadsmonitoracr
  CONTAINER_APP_ENV: threads-monitor-env-sg
  RESOURCE_GROUP: john-threads

jobs:
  # Build images in parallel for speed
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Web Image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/threads-monitor-web:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/threads-monitor-web:buildcache
          cache-to: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/threads-monitor-web:buildcache,mode=max

      - name: Build and Push Worker Image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          build-args: CACHEBUST=${{ github.sha }}
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/threads-monitor-worker:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/threads-monitor-worker:buildcache
          cache-to: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/threads-monitor-worker:buildcache,mode=max

  # Deploy all containers in parallel
  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: web-sg
            image: threads-monitor-web
            minReplicas: 0
          - name: worker-scraper-sg
            image: threads-monitor-worker
            minReplicas: 0
          - name: worker-heartbeat-sg
            image: threads-monitor-worker
            minReplicas: 0
          - name: worker-youtube-sg
            image: threads-monitor-worker
            minReplicas: 1  # Always-on to process BullMQ jobs
          - name: worker-metrics-sg
            image: threads-monitor-worker
            minReplicas: 1
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR Credentials
        id: acr-creds
        run: |
          ACR_PASSWORD=$(az acr credential show --name ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASSWORD"
          echo "acr_password=$ACR_PASSWORD" >> $GITHUB_OUTPUT

      - name: Deploy ${{ matrix.name }}
        run: |
          az containerapp update \
            --name ${{ matrix.name }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ matrix.image }}:${{ github.sha }} \
            --min-replicas ${{ matrix.minReplicas }} \
            --max-replicas 10
